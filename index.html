<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prithiv Raj - Windows 95 Portfolio</title>
    
    <!-- Windows 95 Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    
    <style>
      /* MS Sans Serif approximation */
      @font-face {
        font-family: 'MS Sans Serif';
        src: local('Tahoma'), local('Geneva'), local('Verdana'), local('sans-serif');
        font-weight: normal;
        font-style: normal;
      }
      
      /* Default system font stack */
      * {
        font-family: 'MS Sans Serif', 'Tahoma', 'Geneva', 'Verdana', sans-serif;
      }
      
      /* Monospace for code/notepad */
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100..700;1,100..700&display=swap');
      * {
        font-family: 'IBM Plex Mono', 'Courier New', monospace !important;
      }
      
      /* Serif for IE/blog content */
      .font-serif {
        font-family: 'Times New Roman', 'Times', serif !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
